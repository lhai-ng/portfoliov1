<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="works.css">
</head>
<body>
    <div class="container">
        <div class="img-preview">
            <img src="assets/image1.jpg" alt="">
            <div class="video-container">
                <video autoplay loop muted src="assets/vid2.mp4" data-vid="citysprout"></video>
                <video autoplay loop muted src="assets/vid1.mp4" data-vid="hndelicacies"></video>
            </div>
        </div>

        <div class="year-count">
            <div class="thousands">
                <div class="list">
                    <div>2</div>
                </div>
            </div>
            <div class="hundreds">
                <div class="list">
                    <div>0</div>
                </div>
            </div>
            <div class="tens">
                <div class="list">
                    <div class="nine">9</div>
                    <div class="eight">8</div>
                    <div class="seven">7</div>
                    <div class="six">6</div>
                    <div class="five">5</div>
                    <div class="four">4</div>
                    <div class="three">3</div>
                    <div class="two">2</div>
                    <div class="one">1</div>
                    <div class="zero">0</div>
                </div>
            </div>
            <div class="units">
                <div class="list">
                    <div class="nine">9</div>
                    <div class="eight">8</div>
                    <div class="seven">7</div>
                    <div class="six">6</div>
                    <div class="five">5</div>
                    <div class="four">4</div>
                    <div class="three">3</div>
                    <div class="two">2</div>
                    <div class="one">1</div>
                    <div class="zero">0</div>
                </div>
            </div>
        </div>

        <div class="minimap">
            <div class="indicator"></div>
            <div class="items">
                <div class="item" data-year="2026" data-vid="hndelicacies"><img src="assets/image1.jpg" alt=""></div>
                <div class="item" data-year="2026" data-vid="citysprout"><img src="assets/image2.jpg" alt=""></div>
                <div class="item" data-year="2025"><img src="assets/image3.jpg" alt=""></div>
                <div class="item" data-year="2025"><img src="assets/image4.jpg" alt=""></div>
                <div class="item" data-year="2025"><img src="assets/image5.jpg" alt=""></div>
                <div class="item" data-year="2024"><img src="assets/image6.jpg" alt=""></div>
                <div class="item" data-year="2024"><img src="assets/image7.jpg" alt=""></div>
                <div class="item" data-year="2024"><img src="assets/image8.jpg" alt=""></div>
                <div class="item" data-year="2023"><img src="assets/image9.jpg" alt=""></div>
                <div class="item" data-year="2023"><img src="assets/image10.jpg" alt=""></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/CustomEase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="works.js"></script>
</body>
</html>
